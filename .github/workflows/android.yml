name: Android CI-CD

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build & Test Debug App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Bootstrap Valid Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          if command -v gradle >/dev/null 2>&1; then
            echo "Generating Gradle wrapper jar using pre-installed gradle..."
            gradle wrapper
          else
            echo "Gradle CLI not found, downloading from official gradle GitHub repository tag..."
            curl -sSLo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.12.0/gradle/wrapper/gradle-wrapper.jar
          fi
          # Verify file size and properties
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create environment configuration
        run: |
          # Android project uses the Secrets Gradle Plugin with .env/default (.env.example)
          # We make sure that a .env file is present so that compilation succeeds
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64 into debug.keystore..."
            base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found!"
          fi

      - name: Change permissions for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Run JVM Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Build Release App
    runs-on: ubuntu-latest
    # Only run on pushes to target branches to protect secrets and avoid redundant builds on local dev PRs
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Bootstrap Valid Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          if command -v gradle >/dev/null 2>&1; then
            echo "Generating Gradle wrapper jar using pre-installed gradle..."
            gradle wrapper
          else
            echo "Gradle CLI not found, downloading from official gradle GitHub repository tag..."
            curl -sSLo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.12.0/gradle/wrapper/gradle-wrapper.jar
          fi
          # Verify file size and properties
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create environment configuration
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64 into debug.keystore..."
            base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found!"
          fi

      - name: Change permissions for Gradlew
        run: chmod +x gradlew

      - name: Setup Keystore from Secret
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "Decoding release signing keystore..."
            echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
          else
            echo "SIGNING_KEYSTORE_BASE64 secret is not defined. Falling back to the localized debug keystore for compilation test."
            # Fall back to using the debug keystore as a placeholder to allow building without failing configuration
            if [ -f debug.keystore ]; then
              cp debug.keystore my-upload-key.jks
            elif [ -f debug.keystore.base64 ]; then
              echo "Decoding debug.keystore.base64 as a fallback release keystore..."
              cat debug.keystore.base64 | base64 --decode > my-upload-key.jks
            fi
          fi

      - name: Build Release Bundle & APK
        env:
          KEYSTORE_PATH: my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'android' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Release Bundle (AAB) Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/app-release.aab
