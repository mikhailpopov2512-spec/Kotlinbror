name: Android CI-CD

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build & Test Debug App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Bootstrap Valid Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          if command -v gradle >/dev/null 2>&1; then
            echo "Generating Gradle wrapper jar using pre-installed gradle..."
            gradle wrapper
          else
            echo "Gradle CLI not found, downloading from official gradle GitHub repository tag..."
            curl -sSLo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.12.0/gradle/wrapper/gradle-wrapper.jar
          fi
          # Verify file size and properties
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create environment configuration
        run: |
          # Android project uses the Secrets Gradle Plugin with .env/default (.env.example)
          # We make sure that a .env file is present so that compilation succeeds
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64 into debug.keystore..."
            tr -d '\r\n ' < debug.keystore.base64 | base64 -d > debug.keystore 2>/dev/null || tr -d '\r\n ' < debug.keystore.base64 | base64 --decode > debug.keystore
          fi
          
          if [ ! -f debug.keystore ]; then
            echo "Generating a standard debug keystore using keytool..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          ls -la debug.keystore

      - name: Change permissions for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Run JVM Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
